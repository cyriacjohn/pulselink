<h3>Latest Blood Donation News</h3>

<div class="ticker">
  <div class="ticker-content">
    <div *ngFor="let item of news" class="ticker-item">
      {{item.title}} &nbsp;&nbsp; • &nbsp;&nbsp;
    </div>
  </div>
</div>

<div class="dashboard-container">
  <div class="card">
    <h3>Total Donations</h3>
    <p>{{stats?.totalDonations}}</p> 
  </div>
  
  <div class="card">
    <h3>Pending Donations</h3>
    <p>{{stats?.pendingDonations}}</p>
  </div>

  <div class="card">
    <h3>Completed Donations</h3>
    <p>{{stats?.completedDonations}}</p>
  </div>

  <div class="card">
    <h3>Total Units Available</h3>
    <p>{{stats?.totalUnitsAvailable}}</p>
  </div>
</div>
