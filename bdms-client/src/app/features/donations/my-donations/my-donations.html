<div class="container mt-4">
  <h3>My Donations</h3>
  <table class="table table-hover table-striped shadow-sm">
    <thead>
      <tr>
        <th>Hospital</th>
        <th>Date</th>
        <th>Status</th>
        <th>Certificate</th>
        <th>Approve/Reject</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let donation of donations">
        <td>{{ donation.hospital.name }}</td>
        <td>{{ donation.donationDate | date }}</td>
        <td>
          <span [ngClass]="
{
'badge bg-warning': donation.status === 'Pending',
 'badge bg-success': donation.status === 'Approved',
  'badge bg-primary': donation.status === 'Completed',
  'badge bg-danger': donation.status === 'Rejected' }">
            {{ donation.status}}
          </span>
        </td>
        <td>
          <button *ngIf="donation.status === 'Approved'" class="btn btn-primary btn-sm" (click)="download(donation.id)">Download</button>
        </td>
        <td>
          <button class="btn btn-sm btn-success" *ngIf="donation.status === 'Pending'" (click)="approve(donation.id)">Approve</button>
          <button class="btn btn-sm btn-danger" *ngIf="donation.status === 'Pending'" (click)="reject(donation.id)">Reject</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
