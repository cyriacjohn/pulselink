<div class="container mt-5" style="max-width:400px">

  <h3 class="text-center mb-4">Blood Donation Manager</h3>

  <form (ngSubmit)="login()">
    <div class="mb-3">
      <label>Email</label>
      <input type="email" [(ngModel)]="model.email" name="email" class="form-control" />
    </div>
    <div class="mb-3">
      <label>Password</label>
        <input type="password" [(ngModel)]="model.password" name="password" class="form-control"/>
      </div>

    <button type="submit" class="btn btn-danger">Login</button>
  </form>

  <div class="text-center mt-3">
    <a routerLink="/register">Create account</a>
  </div>
</div>
