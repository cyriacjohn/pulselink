<h2>Create Donor</h2>

<form [formGroup]="data" (ngSubmit)="submit()">

  <div>
    <label>Name:</label>
    <input formControlName="name" />
    </div>

  <div>
    <label>Email:</label>
    <input type="email" formControlName="email" />
  </div>

  <div>
    <label>Phone:</label>
    <input formControlName="phone" />
  </div>

  <div>
    <label>BloodGroup:</label>
    <select formControlName="bloodGroup">
    <option [ngValue]="0">A+</option>
    <option [ngValue]="1">A-</option>
    <option [ngValue]="2">B+</option>
    <option [ngValue]="3">B-</option>
    <option [ngValue]="4">AB+</option>
    <option [ngValue]="5">AB-</option>
    <option [ngValue]="6">O+</option>
    <option [ngValue]="7">O-</option>
      </select>
  </div>

  <div>
    <label>Age:</label>
    <input type="number" formControlName="age" />
  </div>

  <div>
    <label>Address</label>
    <input formControlName="address" />
  </div>

  <button type="submit">Save</button>
</form>
