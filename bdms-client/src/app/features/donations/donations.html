<div class="container mt-4">

  <div class="d-flex justify-content between align-items-center mb-4">
    <h3 class="fw-bold m-0">Donations</h3>
    <div class="ms-auto d-flex align-items-center">
      <label class="me-2 fw-semibold">Status:</label>
      <select [ngModel]="selectedStatus" class="form-select-sm w-auto shadow-sm" (change)="onStatusChange($event)">
        <option value="">All</option>
        <option value="0">Pending</option>
        <option value="1">Approved</option>
        <option value="2">Completed</option>
        <option value="3">Rejected</option>
      </select>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-body p-0">
      <table class="table table-striped table-hover mb-0 text-center align-middle" border="1" *ngIf="donations.length > 0">
        <thead class="table-light">
          <tr>
            <th>Donor</th>
            <th>Hospital</th>
            <th>Blood</th>
            <th>Date</th>
            <th>Status</th>
            <th>Approve/Reject</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let donation of donations">
            <td>{{ donation.donorName }}</td>
            <td>{{ donation.hospitalName }}</td>
            <td>{{ donation.bloodGroup }}</td>
            <td>{{ donation.donationDate | date: 'short' }}</td>
            <td>
              <span [ngClass]="
              {
              'badge bg-warning': donation.status == 0,
               'badge bg-success': donation.status == 1,
                'badge bg-primary': donation.status == 2,
                'badge bg-danger': donation.status == 3}">{{ getStatusText(donation.status)}}</span>
            </td>

            <td *ngIf="isAdmin && donation.status == 0">
              <button class="btn btn-sm btn-success" (click)="approve(donation.id)">Approve</button>
              <button class="btn btn-sm btn-danger" (click)="reject(donation.id)">Reject</button>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
