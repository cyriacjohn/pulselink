<div class="container mt-5" style="max-width:400px">

  <h3 class="text-center mb-4">Blood Donation Manager</h3>

  <form (ngSubmit)="login()">
    <div class="mb-3">
      <label>Username</label>
      <input type="text" [(ngModel)]="username" name="username" class="form-control" />
    </div>
    <div class="mb-3">
      <label>Password</label>
        <input type="password" [(ngModel)]="password" name="password" class="form-control"/>
      </div>

    <button type="submit" class="btn btn-danger">Login</button>
  </form>

  <div class="text-center mt-3">
    <a href="/register" class="mt-3 d-block">Create account</a>
  </div>
</div>
