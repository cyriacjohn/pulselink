<div class="container mt-3">
  <h3>Latest Blood Donation News</h3>

  <div class="ticker">
    <div class="ticker-content">
      <div *ngFor="let item of news" class="ticker-item">
        {{item.title}} &nbsp;&nbsp; • &nbsp;&nbsp;
      </div>
    </div>
  </div>

  <div class="row mb-4">
    <div class="col-md-6 mx-auto">
      <div class="chart-container">
        <canvas id="userChart"></canvas>
      </div>
    </div>
  </div>

  <div class="row text-center">
    <div class="col-md-4 mb-3">
      <div class="card shadow-sm bg-primary text-white">
        <div class="card-body">
          <h6>Total Donations</h6>
          <h2>{{stats?.totalDonations}}</h2>
        </div>
      </div>
    </div>

    <div class="col-md-4 mb-3">
      <div class="card shadow-sm bg-warning text-white">
        <div class="card-body">
          <h6>Pending Donations</h6>
          <h2>{{stats?.pendingDonations}}</h2>
        </div>
      </div>
    </div>

    <div class="col-md-4 mb-3">
      <div class="card shadow-sm bg-danger text-white">
        <div class="card-body">
          <h6>Rejected Donations</h6>
          <h2>{{stats?.rejectedDonations}}</h2>
        </div>
      </div>
    </div>
  </div>
</div>
